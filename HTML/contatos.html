                <button type="button" class="Btn" data-bs-toggle="button"><img class="btnLogoWhats"
                        src="/img/whatsapp.png" alt="Logo Whatsapp">Venda para nós</button>
            </section>
            <section>
                <fieldset>
                    <form method="post" action="#" class="formulario">
                        <h3 class="sub_titulo">Formulário para contato</h3>
                        <div class="area_mens">
                            <input class="obj_form" type="text" id="nome" placeholder="Nome" required>
                            <input class="obj_form" type="email" id="email" placeholder="E-mail" required>
                            <input class="obj_form" type="tel" id="telefone" placeholder="Tel">
                        </div>
                        <div class="area_mens">
                            <textarea class="mensa" cols="30" rows="10" placeholder="Mensagem"></textarea>
                        </div>
                    </form>
